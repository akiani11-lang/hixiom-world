<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIXIOM² — Personal Website</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Syne:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Der unfehlbare Klick-Auslöser über reines CSS -->
    <input type="checkbox" id="page-toggle" style="display: none;">

    <!-- Das feine Filmkorn läuft im Hintergrund -->
    <div class="film-grain"></div>

    <!-- DER STARTBILDSCHIRM (Klickbar über das Label) -->
    <label for="page-toggle" id="intro-screen">
        <div class="intro-content">
            <h1 class="intro-title">HIXIOM²</h1>
            <p class="intro-subtitle">Singer • Gamer • Developer • Dreamer</p>
            <span class="click-notice">[ Hier klicken um einzutreten ]</span>
        </div>
    </label>

    <!-- DEINE PROFIL- UND ABOUT-PAGE -->
    <main id="main-content">
        <div class="profile-container">
            
            <div class="profile-header">
                <h2 class="profile-name">hixiom²</h2>
                <p class="profile-bio">
                    Hi, I’m Hix. Welcome to my little corner of the internet. I’m passionate about music, gaming, development and creating memorable experiences. I love creating new things, meeting people and sharing my creativity with the world.
                </p>
            </div>

            <!-- Schwebende, glühende Social Buttons -->
            <div class="social-links">
                <a href="#" class="social-btn btn-roblox" target="_blank">Roblox</a>
                <a href="#" class="social-btn btn-discord" target="_blank">Discord</a>
                <a href="#" class="social-btn btn-spotify" target="_blank">Spotify</a>
                <a href="#" class="social-btn btn-instagram" target="_blank">Instagram</a>
                <a href="#" class="social-btn btn-tiktok" target="_blank">TikTok</a>
            </div>

        </div>
    </main>

</body>
</html>
